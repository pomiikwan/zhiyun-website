        <!-- 一二级市场联动 Flow SVG Diagram -->
        <section class="detail-section">
          <h2 class="detail-section-title"><i data-lucide="workflow" style="width:20px;height:20px"></i>一二级市场联动流程</h2>
          <div class="diagram-container">
            <svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:800px;margin:0 auto;display:block">
              <defs>
                <marker id="flowArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                  <polygon points="0 0, 10 3.5, 0 7" fill="#89b4fa"/>
                </marker>
              </defs>

              <!-- Step 1: 二级市场建仓 -->
              <rect x="20" y="50" width="160" height="100" rx="12" fill="#252536" stroke="#89b4fa" stroke-width="2"/>
              <text x="100" y="85" text-anchor="middle" fill="#89b4fa" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">第一步</text>
              <text x="100" y="110" text-anchor="middle" fill="#cdd6f4" font-family="Inter, system-ui, sans-serif" font-size="12">二级市场建仓</text>
              <text x="100" y="132" text-anchor="middle" fill="#6c7086" font-family="Inter, system-ui, sans-serif" font-size="10">上海导师团队操作</text>

              <!-- Arrow 1→2 -->
              <line x1="180" y1="100" x2="220" y2="100" stroke="#89b4fa" stroke-width="2" marker-end="url(#flowArrow)"/>

              <!-- Step 2: 资产注入方案 -->
              <rect x="220" y="50" width="160" height="100" rx="12" fill="#252536" stroke="#a6e3a1" stroke-width="2"/>
              <text x="300" y="85" text-anchor="middle" fill="#a6e3a1" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">第二步</text>
              <text x="300" y="110" text-anchor="middle" fill="#cdd6f4" font-family="Inter, system-ui, sans-serif" font-size="12">资产注入方案</text>
              <text x="300" y="132" text-anchor="middle" fill="#6c7086" font-family="Inter, system-ui, sans-serif" font-size="10">芯片/算力资产装入</text>

              <!-- Arrow 2→3 -->
              <line x1="380" y1="100" x2="420" y2="100" stroke="#89b4fa" stroke-width="2" marker-end="url(#flowArrow)"/>

              <!-- Step 3: 上市公司联动 -->
              <rect x="420" y="50" width="160" height="100" rx="12" fill="#252536" stroke="#cba6f7" stroke-width="2"/>
              <text x="500" y="85" text-anchor="middle" fill="#cba6f7" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">第三步</text>
              <text x="500" y="110" text-anchor="middle" fill="#cdd6f4" font-family="Inter, system-ui, sans-serif" font-size="12">上市公司联动</text>
              <text x="500" y="132" text-anchor="middle" fill="#6c7086" font-family="Inter, system-ui, sans-serif" font-size="10">定增+股价管理</text>

              <!-- Step 4: 资产端变现 -->

  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof SITE_DATA === 'undefined') return;
      const task = SITE_DATA.tasks['P3'];

      // Background
      document.getElementById('taskBackground').textContent = task.background;

      // Core Demands
      const demandsList = document.getElementById('coreDemands');
      task.coreDemands.forEach(d => {
        const li = document.createElement('li');
        li.textContent = d;
        demandsList.appendChild(li);
      });

      // Key Questions
      const questionsList = document.getElementById('keyQuestions');
      task.keyQuestions.forEach(q => {
        const li = document.createElement('li');
        li.textContent = q;
        questionsList.appendChild(li);
      });

      // Dependencies
      const depsContainer = document.getElementById('dependencies');
      task.dependencies.forEach(dep => {
        const target = SITE_DATA.tasks[dep.target];
        const depEl = document.createElement('a');
        depEl.href = target.href;
        depEl.className = 'related-node';
        depEl.style.marginBottom = '8px';
        const isBidirectional = dep.type === 'bidirectional';
        depEl.innerHTML = `
          <i data-lucide="${isBidirectional ? 'arrow-left-right' : 'arrow-right'}" style="width:14px;height:14px;color:var(--accent-${dep.target === 'P2' ? 'yellow' : 'blue'})"></i>
          <span><strong>${dep.target}</strong>: ${target.title}</span>
          <span class="tag ${isBidirectional ? 'red' : 'blue'}" style="margin-left:8px">${isBidirectional ? '双向依赖' : '单向依赖'}</span>
        `;
        depsContainer.appendChild(depEl);
        const desc = document.createElement('div');
        desc.style.cssText = 'font-size:0.8125rem;color:var(--text-muted);margin-bottom:12px;margin-left:22px';
        desc.textContent = dep.desc;
        depsContainer.appendChild(desc);
      });

      // Agents
      const agentsContainer = document.getElementById('agents');
      task.agents.forEach(agent => {
        const el = document.createElement('span');
        el.className = 'tag blue';
        el.style.cursor = 'default';
        el.textContent = agent.replace(/_/g, ' ');
        agentsContainer.appendChild(el);
      });

      // Deliverables
      const deliverablesList = document.getElementById('deliverables');
      task.deliverables.forEach(d => {
        const li = document.createElement('li');
        li.textContent = d;
        deliverablesList.appendChild(li);
      });

      // Re-init icons for dynamically added elements
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>
